  <script>
    // Force service worker update check on every load
    // Cache-buster version: change this to force SW refresh
    const SW_VERSION = '2.1.7b';

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          // Unregister any old service workers first if stuck
          const registrations = await navigator.serviceWorker.getRegistrations();

          // Register with cache-busting query param
          const reg = await navigator.serviceWorker.register('/service-worker.js?v=' + SW_VERSION);
          console.log('Service Worker registered v' + SW_VERSION);

          // Force update check immediately
          reg.update();

          // Listen for updates and auto-reload
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage('skipWaiting');
                }
              });
            }
          });

          // Reload when new SW takes control
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });
        } catch (err) {
          console.log('Service Worker registration failed:', err);
        }
      });
    }
  </script>
